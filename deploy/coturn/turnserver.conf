# coturn for circle — HMAC shared-secret (time-bounded) creds. The relay
# issues ephemeral {username, credential} pairs from GET /turn/credentials,
# computing credential = base64(HMAC-SHA1(TURN_SECRET, username)). coturn
# validates the same way. TURN_SECRET here MUST equal the relay's env.

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# REQUIRED: this box's PUBLIC IP. Auto-detection often picks a private/NAT
# IP on cloud hosts, which breaks relaying (clients dial an unroutable addr).
external-ip=__PUBLIC_IP__

# Relay UDP port range — keep narrow so firewall rules stay simple. Open
# these UDP ports (plus 3478 UDP/TCP) on the box's firewall/security group.
min-port=49160
max-port=49200

# HMAC auth — must match the relay's TURN_SECRET.
use-auth-secret
static-auth-secret=__TURN_SHARED_SECRET__

realm=circle

# Deny loopback/private/multicast relay peers (anti-amplification).
no-loopback-peers
no-multicast-peers
no-cli

# STUN/TURN over UDP+TCP is enough; skip TLS certs for v1.
no-tls
no-dtls

verbose=0
no-stdout-log
syslog
